[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@layerzerolabs/=lib/layerzero-v2/packages/layerzero-v2/evm/oapp/contracts/",
    "forge-std/=lib/forge-std/src/"
]
